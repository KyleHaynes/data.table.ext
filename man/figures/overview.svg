<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7fa"/>
      <stop offset="100%" stop-color="#dfe9f3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect x="60" y="70" width="1080" height="560" rx="20" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text x="100" y="135" font-size="44" font-family="Segoe UI, Arial, sans-serif" fill="#0f172a" font-weight="700">data.table.ext</text>
  <text x="100" y="175" font-size="24" font-family="Segoe UI, Arial, sans-serif" fill="#334155">Readable data.table output for fast analysis and better demos</text>

  <rect x="100" y="220" width="310" height="340" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="122" y="265" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#0c4a6e" font-weight="700">Print Enhancements</text>
  <text x="122" y="305" font-size="20" font-family="Consolas, monospace" fill="#075985">- row index separators</text>
  <text x="122" y="335" font-size="20" font-family="Consolas, monospace" fill="#075985">- group separators</text>
  <text x="122" y="365" font-size="20" font-family="Consolas, monospace" fill="#075985">- class token styling</text>
  <text x="122" y="395" font-size="20" font-family="Consolas, monospace" fill="#075985">- ncol header</text>

  <rect x="445" y="220" width="310" height="340" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="467" y="265" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#14532d" font-weight="700">Smarter Sampling</text>
  <text x="467" y="305" font-size="20" font-family="Consolas, monospace" fill="#166534">- grouped expansion</text>
  <text x="467" y="335" font-size="20" font-family="Consolas, monospace" fill="#166534">- coverage sorting</text>
  <text x="467" y="365" font-size="20" font-family="Consolas, monospace" fill="#166534">- optional color mode</text>
  <text x="467" y="395" font-size="20" font-family="Consolas, monospace" fill="#166534">- demo-ready output</text>

  <rect x="790" y="220" width="310" height="340" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="812" y="265" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#7c2d12" font-weight="700">Mask Helpers</text>
  <text x="812" y="305" font-size="20" font-family="Consolas, monospace" fill="#92400e">- cleaner str()</text>
  <text x="812" y="335" font-size="20" font-family="Consolas, monospace" fill="#92400e">- cleaner dput()</text>
  <text x="812" y="365" font-size="20" font-family="Consolas, monospace" fill="#92400e">- one-call setup:</text>
  <text x="812" y="395" font-size="20" font-family="Consolas, monospace" fill="#92400e">  turn_everyone_on()</text>
</svg>
